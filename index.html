<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>排行榜 — Gambler's Table</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0b18; color:#eeeef8; font-family:'Segoe UI',sans-serif; min-height:100vh; }

header {
  background:#12101e;
  border-bottom:2px solid #be9428;
  padding:20px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
header h1 { color:#d4b437; font-size:24px; letter-spacing:1px; }
header a {
  color:#a09fbf; font-size:14px; text-decoration:none;
  border:1px solid #2a2a42; padding:8px 18px; border-radius:6px;
}
header a:hover { border-color:#be9428; color:#d4b437; }

.container { max-width:900px; margin:0 auto; padding:32px 16px; }

.meta { color:#828296; font-size:13px; margin-bottom:24px; display:flex; justify-content:space-between; align-items:center; }
.refresh-btn {
  background:none; border:1px solid #2a2a42; color:#a09fbf;
  padding:6px 16px; border-radius:5px; cursor:pointer; font-size:13px;
}
.refresh-btn:hover { border-color:#be9428; color:#d4b437; }

table { width:100%; border-collapse:collapse; }
thead tr { background:#1a1628; border-bottom:2px solid #be9428; }
th { padding:14px 16px; text-align:left; color:#be9428; font-size:13px; font-weight:600; letter-spacing:.5px; }
tbody tr { border-bottom:1px solid #1e1e2e; transition:background .15s; }
tbody tr:hover { background:#16142a; }
td { padding:14px 16px; font-size:15px; }

.rank { color:#828296; font-weight:700; width:48px; }
.rank.top1 { color:#ffd700; }
.rank.top2 { color:#c0c0c0; }
.rank.top3 { color:#cd7f32; }
.name { color:#eeeef8; font-weight:600; }
.money { color:#4bc850; font-family:monospace; }
.total { color:#d4b437; font-family:monospace; }
.prestige { color:#4bd2d2; text-align:center; }
.lastseen { color:#828296; font-size:13px; }

.empty { text-align:center; padding:60px; color:#828296; font-size:16px; }
.loading { text-align:center; padding:60px; color:#828296; }
.spinner { display:inline-block; width:32px; height:32px; border:3px solid #2a2a42; border-top-color:#be9428; border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }

.medal { font-size:20px; margin-right:4px; }

.name-btn { background:none; border:none; cursor:pointer; color:#eeeef8; font-weight:600; font-size:15px; font-family:inherit; display:flex; align-items:center; gap:6px; padding:0; }
.name-btn .arrow { color:#be9428; font-size:11px; transition:transform .15s; display:inline-block; }
.name-btn.open .arrow { transform:rotate(90deg); }
.detail-row td { padding:0; }
.detail-box { display:none; background:#100e1c; padding:10px 16px 14px 48px; }
.detail-row.open .detail-box { display:block; }
.detail-table { width:100%; border-collapse:collapse; margin-top:4px; }
.detail-table th { color:#7a7a94; font-size:11px; font-weight:600; text-align:left; padding:4px 10px; }
.detail-table td { padding:5px 10px; font-size:13px; border-bottom:none; }
.detail-table tr.cur-slot td { color:#f0d060; }
.slot-tag { color:#a09fbf; font-family:monospace; }
</style>
</head>
<body>
<header>
  <h1>🎰 Gambler's Table 排行榜</h1>
  <a href="https://ancheng0904-collab.github.io/gamblers-table/">← 回到遊戲</a>
</header>

<div class="container">
  <div class="meta">
    <span id="updateTime">載入中...</span>
    <button class="refresh-btn" onclick="load()">重新整理</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>玩家名稱</th>
        <th>目前金幣</th>
        <th>總收益</th>
        <th>獻祭次數</th>
        <th>上次上線</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6"><div class="loading"><div class="spinner"></div><br>載入中...</div></td></tr>
    </tbody>
  </table>
</div>

<script>
const SB_URL='https://asxpwrjrftlpuxbtpxjh.supabase.co';
const SB_KEY='sb_publishable_f8aj3NpIIGqFERuwwMFoYQ_m4f1YFOl';

function fmt(n){
  if(n<1e3) return '$'+Math.round(n);
  if(n>=1e12) return '$'+(n/1e12).toFixed(2)+'T';
  if(n>=1e9)  return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)  return '$'+(n/1e6).toFixed(2)+'M';
  return '$'+(n/1e3).toFixed(2)+'K';
}

function timeAgo(iso){
  const sec=Math.floor((Date.now()-new Date(iso))/1000);
  if(sec<60) return '剛剛';
  if(sec<3600) return Math.floor(sec/60)+'分鐘前';
  if(sec<86400) return Math.floor(sec/3600)+'小時前';
  return Math.floor(sec/86400)+'天前';
}

function groupByDevice(rows){
  const map=new Map();
  for(const p of rows){
    if(!map.has(p.device_id)) map.set(p.device_id,[]);
    map.get(p.device_id).push(p);
  }
  const groups=[];
  for(const [device_id,slots] of map){
    slots.sort((a,b)=>(a.slot||1)-(b.slot||1));
    const best=slots.reduce((a,b)=>(b.total_earned>a.total_earned?b:a));
    groups.push({device_id,slots,best});
  }
  groups.sort((a,b)=>b.best.total_earned-a.best.total_earned);
  return groups;
}

function toggleDetail(rowId){
  const nameBtn=document.getElementById('nb_'+rowId);
  const detail=document.getElementById('dr_'+rowId);
  detail.classList.toggle('open');
  nameBtn.classList.toggle('open');
}

async function load(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='<tr><td colspan="6"><div class="loading"><div class="spinner"></div><br>載入中...</div></td></tr>';
  try{
    const res=await fetch(`${SB_URL}/rest/v1/players?select=*&order=total_earned.desc&limit=300`,{
      method:'GET',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}
    });
    if(!res.ok){
      const err=await res.text();
      tbody.innerHTML=`<tr><td colspan="6"><div class="empty">錯誤 ${res.status}：${esc(err)}</div></td></tr>`;
      return;
    }
    const data=await res.json();
    if(!Array.isArray(data)||!data.length){
      tbody.innerHTML='<tr><td colspan="6"><div class="empty">還沒有玩家資料，快去玩遊戲吧！</div></td></tr>';
      document.getElementById('updateTime').textContent=`0 位玩家 · 更新於 ${new Date().toLocaleTimeString('zh-TW')}`;
      return;
    }
    const groups=groupByDevice(data);
    const medals=['🥇','🥈','🥉'];
    tbody.innerHTML=groups.map((g,i)=>{
      const p=g.best, rowId=i;
      const detailRows=g.slots.map(s=>`
        <tr class="${s===g.best?'cur-slot':''}">
          <td class="slot-tag">Slot ${s.slot||1}</td>
          <td class="money">${fmt(s.money)}</td>
          <td class="total">${fmt(s.total_earned)}</td>
          <td class="prestige">${s.prestige_count>0?'×'+s.prestige_count:'—'}</td>
          <td class="lastseen">${timeAgo(s.last_seen)}</td>
        </tr>`).join('');
      return `
      <tr>
        <td class="rank ${i<3?'top'+(i+1):''}">${medals[i]||'#'+(i+1)}</td>
        <td class="name">
          <button class="name-btn" id="nb_${rowId}" onclick="toggleDetail(${rowId})">
            <span class="arrow">▶</span>${esc(p.player_name)}
          </button>
        </td>
        <td class="money">${fmt(p.money)}</td>
        <td class="total">${fmt(p.total_earned)}</td>
        <td class="prestige">${p.prestige_count>0?'×'+p.prestige_count:'—'}</td>
        <td class="lastseen">${timeAgo(p.last_seen)}</td>
      </tr>
      <tr class="detail-row" id="dr_${rowId}">
        <td colspan="6">
          <div class="detail-box">
            <table class="detail-table">
              <thead><tr><th>存檔</th><th>目前金幣</th><th>總收益</th><th>獻祭次數</th><th>上次上線</th></tr></thead>
              <tbody>${detailRows}</tbody>
            </table>
          </div>
        </td>
      </tr>`;
    }).join('');
    document.getElementById('updateTime').textContent=`共 ${groups.length} 位玩家 · 更新於 ${new Date().toLocaleTimeString('zh-TW')}`;
  }catch(e){
    tbody.innerHTML=`<tr><td colspan="6"><div class="empty">連線失敗：${esc(e.message)}<br><small>請確認網路連線後重新整理</small></div></td></tr>`;
  }
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

load();
setInterval(load,30000);
</script>
</body>
</html>
